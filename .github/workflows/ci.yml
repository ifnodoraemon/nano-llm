name: nano-llm CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install dependencies directly from pyproject.toml
        pip install .[dev]

    - name: Run Black Code Style Lint Check
      run: |
        # Check formatting compliance (non-blocking, just outputs differences)
        black --check --diff .

    - name: Execute PyTorch Unit Tests
      run: |
        # Run all test suites inside the tests/ folder
        python -m unittest discover -s tests -p "test_*.py"
